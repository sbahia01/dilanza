<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DILANZA | Luxury Concept</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="lang-selector">
            <button class="lang-btn active">PT</button>
            <button class="lang-btn">EN</button>
        </div>
        <h1 id="brandName">DILANZA</h1>
    </header>

    <main class="gallery-container">
        <div class="product-item">
            <div class="image-box">
                <img src="camisa-preta.webp" alt="Camisa Pima - Preta">
            </div>
            <div class="details-box">
                <h2 class="product-title">CAMISA PIMA - PRETA</h2>
                <p class="product-price">R$ 490,00</p>
                <button class="buy-btn">VER DETALHES</button>
            </div>
        </div>

        <div class="product-item">
            <div class="image-box">
                <img src="camisa-branca.webp" alt="Camisa Pima - Branca">
            </div>
            <div class="details-box">
                <h2 class="product-title">CAMISA PIMA - BRANCA</h2>
                <p class="product-price">R$ 490,00</p>
                <button class="buy-btn">VER DETALHES</button>
            </div>
        </div>
    </main>

</body>
</html>
