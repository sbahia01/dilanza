<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DILANZA | Luxury Concept</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="lang-selector">
            <button id="btnPT" class="lang-btn active" onclick="changeLang('PT')">PT</button>
            <button id="btnEN" class="lang-btn" onclick="changeLang('EN')">EN</button>
        </div>
        <h1 id="brandName">DILANZA</h1>
    </header>

    <main class="gallery-container">
        <div class="product-item">
            <div class="image-box">
                <img src="camisa-preta.webp" alt="Camisa Pima - Preta">
            </div>
            <div class="details-box">
                <h2 id="titleBlack" class="product-title">CAMISA PIMA - PRETA</h2>
                <p id="priceBlack" class="product-price">R$ 490,00</p>
                
                <div class="description-wrapper">
                    <p id="descBlack" class="product-description"></p>
                </div>
                
                <div class="actions">
                    <button id="btnDetailBlack" class="detail-btn" onclick="toggleDetails('black')">VER DETALHES</button>
                    <button id="btnBuyBlack" class="buy-btn" onclick="goToProduct('black')">COMPRAR AGORA</button>
                </div>
            </div>
        </div>

        <div class="product-item">
            <div class="image-box">
                <img src="camisa-branca.webp" alt="Camisa Pima - Branca">
            </div>
            <div class="details-box">
                <h2 id="titleWhite" class="product-title">CAMISA PIMA - BRANCA</h2>
                <p id="priceWhite" class="product-price">R$ 490,00</p>
                
                <div class="description-wrapper">
                    <p id="descWhite" class="product-description"></p>
                </div>
                
                <div class="actions">
                    <button id="btnDetailWhite" class="detail-btn" onclick="toggleDetails('white')">VER DETALHES</button>
                    <button id="btnBuyWhite" class="buy-btn" onclick="goToProduct('white')">COMPRAR AGORA</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
