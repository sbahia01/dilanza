<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DILANZA | Produto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initProduct()">
    <header>
        <h1 onclick="window.location.href='index.html'" style="cursor:pointer">DILANZA</h1>
    </header>

    <main class="product-page-container">
        <div style="flex: 1.5; text-align: center;">
            <img id="mainImg" src="" style="width: 100%; max-width: 500px;">
        </div>

        <div class="product-info-side">
            <nav style="font-size: 10px; color: #999; margin-bottom: 20px;">HOME > CAMISETAS > <span id="bread"></span></nav>
            <h2 id="pTitle" style="letter-spacing: 2px;"></h2>
            <p id="pPrice" style="font-weight: bold; font-size: 18px;"></p>

            <div style="margin: 30px 0;">
                <p style="font-size: 12px;">TAMANHO:</p>
                <div class="size-options">
                    <button onclick="this.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('selected'));this.classList.add('selected')">P</button>
                    <button onclick="this.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('selected'));this.classList.add('selected')">M</button>
                    <button onclick="this.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('selected'));this.classList.add('selected')">G</button>
                </div>
            </div>

            <button class="buy-btn" style="width: 100%; max-width: 350px;">ADICIONAR AO CARRINHO</button>
            
            <div style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; font-size: 12px; line-height: 2;">
                <strong>DETALHES:</strong>
                <ul>
                    <li>100% Algodão Pima</li>
                    <li>Corte Slim Premium</li>
                    <li>Produzido no Brasil</li>
                </ul>
            </div>
        </div>
    </main>

    <script>
        function initProduct() {
            const product = localStorage.getItem('selectedProduct') || 'black';
            const isBlack = product === 'black';
            document.getElementById('mainImg').src = isBlack ? 'camisa-preta.webp' : 'camisa-branca.webp';
            document.getElementById('pTitle').innerText = isBlack ? 'CAMISA PIMA - PRETA' : 'CAMISA PIMA - BRANCA';
            document.getElementById('bread').innerText = isBlack ? 'PRETA' : 'BRANCA';
            document.getElementById('pPrice').innerText = 'R$ 490,00';
        }
    </script>
</body>
</html>
